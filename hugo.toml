# ==============================================================================
# 基础配置
# ==============================================================================
baseURL = 'https://Orangex-position0.github.io/'
languageCode = 'zh-cn'
title = 'Orangex-position0的技术博客'
theme = 'Stack'
hasCJKLanguage = true

# ==============================================================================
# 语言配置
# ==============================================================================
defaultContentLanguage = 'zh-cn'

[languages]
  [languages.zh-cn]
    languageName = '中文'
    title = 'Orangex-position0的技术博客'
    weight = 1

# ==============================================================================
# 菜单配置
# ==============================================================================
[menus]
  [[menus.main]]
    name = '首页'
    pageRef = '/'
    weight = 10

  [[menus.main]]
    name = '文章'
    pageRef = '/posts'
    weight = 20

  [[menus.main]]
    name = '分类'
    pageRef = '/categories'
    weight = 30

  [[menus.main]]
    name = '标签'
    pageRef = '/tags'
    weight = 40

  [[menus.main]]
    name = '归档'
    pageRef = '/archives'
    weight = 45

  [[menus.main]]
    name = '友链'
    pageRef = '/links'
    weight = 47

  [[menus.main]]
    name = '关于'
    pageRef = '/about'
    weight = 50

  # 社交链接（显示在侧边栏头像下方）
  [[menus.social]]
    identifier = 'github'
    name = 'GitHub'
    url = 'https://github.com/Orangex-position0'
    [menus.social.params]
      icon = 'brand-github'

  [[menus.social]]
    identifier = 'bilibili'
    name = 'Bilibili'
    url = 'https://space.bilibili.com/'
    [menus.social.params]
      icon = 'brand-bilibili'

  [[menus.social]]
    identifier = 'email'
    name = 'Email'
    url = 'mailto:1640794497@qq.com'
    [menus.social.params]
      icon = 'brand-email'

  [[menus.social]]
    identifier = 'rss'
    name = 'RSS'
    url = '/index.xml'
    [menus.social.params]
      icon = 'rss'

# ==============================================================================
# Stack 主题配置
# ==============================================================================
[params]
  description = '一个后端程序员的分享欲发泄场所'
  mainSections = ['posts']
  rssFullContent = true

  # 颜色方案
  [params.colorScheme]
    toggle = true
    default = 'auto'

  # 日期格式
  [params.dateFormat]
    published = '2006-01-02'
    lastUpdated = '2006-01-02 15:04'

  # 页脚
  [params.footer]
    since = 2026
    customText = ''

  # 主页配置
  [params.homepage]
    layout = 'profile'

    [params.homepage.profile]
      avatarURL = '/img/avatar.jpg'
      title = 'Orangex-position0的技术博客'
      subtitle = '记录学习 | 分享知识 | 费曼学习法'
      social = true
      disableGrayscaleHover = false

  # 侧边栏配置
  [params.sidebar]
    position = 'left'
    compact = false
    avatar = 'img/avatar.jpg'
    emoji = ''
    subtitle = '记录学习 | 分享知识 | 费曼学习法'

  # 侧边栏小部件
  [params.widgets]
    homepage = [
      { type = 'search' },
      { type = 'archives', params = { limit = 5 } },
      { type = 'categories', params = { limit = 10 } },
      { type = 'tag-cloud', params = { limit = 10 } },
    ]
    page = [
      { type = 'toc' },
    ]

  # 文章列表配置
  [params.list]
    groupByYear = true
    showCards = true

  # 文章页面配置
  [params.article]
    toc = true
    tocOpen = false
    readingTime = true
    estimatedTime = true
    relatedPosts = true
    math = false
    headingAnchor = true

    [params.article.list]
      showTags = true

    [params.article.license]
      enabled = true
      default = 'Licensed under CC BY-NC-SA 4.0'

  # 评论系统
  [params.comments]
    enabled = false

# ==============================================================================
# 分类和标签配置
# ==============================================================================
[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'

# ==============================================================================
# 其他配置
# ==============================================================================
paginate = 10

[markup]
  [markup.highlight]
    style = 'github-dark'
    lineNos = false
    guessSyntax = true
    noClasses = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# ==============================================================================
# 隐私配置
# ==============================================================================
[privacy]
  [privacy.vimeo]
    disabled = false
    simple = true

  [privacy.youtube]
    disabled = false
    privacyEnhanced = true

# ==============================================================================
# Hugo 版本要求
# ==============================================================================
[module]
  [module.hugoVersion]
    extended = false
    min = '0.146.0'
